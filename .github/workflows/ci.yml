name: ecosystem-ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Publishing the same commit to a release branch and main should validate
  # once; annotated release tags are excluded by the branch filter above.
  group: ecosystem-ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown
            any::sessioninfo
          dependencies: 'c("Depends", "Imports", "LinkingTo")'
          install-pandoc: true
          install-quarto: false
      - name: Check all packages in dependency order
        run: Rscript tools/ci-check.R

  integration:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::testthat
            any::knitr
            any::rmarkdown
            any::sessioninfo
          dependencies: 'c("Depends", "Imports", "LinkingTo")'
          install-pandoc: true
          install-quarto: false
      - name: Install and exercise cross-package contracts
        run: Rscript tools/integration-check.R

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::testthat
            any::shinytest2
            any::DT
            any::knitr
            any::rmarkdown
            any::sessioninfo
          dependencies: 'c("Depends", "Imports", "LinkingTo")'
          install-pandoc: true
          install-quarto: false
      - name: Run browser-level GUI regression tests
        env:
          LIBER_RUN_BROWSER_TESTS: "true"
        run: Rscript tools/browser-check.R
