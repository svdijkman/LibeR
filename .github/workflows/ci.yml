name: ecosystem-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-rtools@v2
        if: runner.os == 'Windows'
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pak
            any::rcmdcheck
          needs: check
      - name: Check all packages in dependency order
        run: Rscript tools/ci-check.R

  integration:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-rtools@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pak
            any::testthat
      - name: Install and exercise cross-package contracts
        run: Rscript tools/integration-check.R

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pak
            any::shinytest2
      - name: Run browser-level GUI regression tests
        env:
          LIBER_RUN_BROWSER_TESTS: "true"
        run: Rscript tools/browser-check.R
