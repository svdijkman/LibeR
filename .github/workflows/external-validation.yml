name: external-validation

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poped-pfim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pak
            any::testthat
      - name: Install source dependency graph
        run: >-
          Rscript -e "pak::pkg_install(c('./LibeRtAD', './LibeRation',
          './LibeRality'), dependencies = TRUE, upgrade = FALSE)"
      - name: Validate exact ecosystem build against external engines
        env:
          LIBERALITY_EXTERNAL_REPETITIONS: "3"
        run: Rscript tools/external-validation.R
      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: external-validation-${{ github.sha }}
          path: validation/liberality/external/results
